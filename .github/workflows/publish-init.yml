name: Initial Publish (One-time Setup)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (beta recommended for first publish)"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - next
          - latest

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # Initial publish is restricted to the three adapters that have never
      # appeared on npm: @agent-devtools/vue, /next, /nuxt. The existing
      # /core, /harness-core, /react, /vite are already published and their
      # incremental releases go through .github/workflows/publish.yml via
      # release-it. Re-running this workflow against already-published
      # packages would fail with EPUBLISHCONFLICT, so we explicitly filter.
      - name: Publish new adapters (vue / next / nuxt)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm -r \
            --filter "@agent-devtools/vue" \
            --filter "@agent-devtools/next" \
            --filter "@agent-devtools/nuxt" \
            publish \
            --tag "${{ inputs.tag }}" \
            --access public \
            --no-git-checks
