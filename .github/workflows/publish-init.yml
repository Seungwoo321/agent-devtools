name: Initial Publish (One-time Setup)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (beta recommended for first publish)"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - next
          - latest

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish (recursive across packages/*)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm -r --filter "./packages/*" publish \
            --tag "${{ inputs.tag }}" \
            --access public \
            --no-git-checks
