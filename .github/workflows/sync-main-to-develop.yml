name: Sync main to develop

# Runs on every push to main, including release commits whose messages
# end with `[skip ci]`. The `[skip ci]` guard is intentionally omitted —
# without that omission the back-merge never fires after a stable release,
# and develop drifts a version behind main every cycle (the exact bug that
# made every develop → main PR conflict on packages/*/package.json and
# CHANGELOG.md).

on:
  push:
    branches: [main]

concurrency:
  group: sync-main-to-develop
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout develop
        uses: actions/checkout@v5
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Back-merge main into develop
        run: |
          git fetch origin main
          if ! git merge --no-ff origin/main -m "chore: sync main into develop after stable release [skip ci]"; then
            # After a stable release main is authoritative for release
            # bookkeeping: package versions, changelogs, and the changesets
            # pre-mode state (pre.json flips to mode=exit, consumed .md are
            # deleted). Take main's side; develop re-enters pre mode on its next
            # push. The normal back-merge is already conflict-free — develop does
            # not touch these files between the develop -> main PR and this sync —
            # so this block only fires on a race (a develop push overlapping the
            # release), where re-deriving the beta state from main's base is
            # correct.
            git checkout --theirs packages/*/package.json packages/*/CHANGELOG.md 2>/dev/null || true
            git add packages/*/package.json packages/*/CHANGELOG.md 2>/dev/null || true
            # The stable release deletes the changesets pre-mode bookkeeping on
            # main: pre.json is removed once `changeset version` finalises the
            # exit, and every applied .md is consumed. These surface as
            # modify/delete conflicts (no "theirs" blob to check out), so accept
            # the deletions — develop re-enters pre mode and recreates pre.json on
            # its next push. Changesets that exist only on develop did not change
            # on main and do not conflict, so they survive untouched.
            for f in $(git diff --name-only --diff-filter=U -- '.changeset/pre.json' '.changeset/*.md'); do
              git rm -f "$f" 2>/dev/null || true
            done
            if [ -n "$(git ls-files -u)" ]; then
              echo "Non-version conflicts detected. Manual intervention required."
              git merge --abort
              exit 1
            fi
            git commit --no-edit
          fi
          git push origin develop
