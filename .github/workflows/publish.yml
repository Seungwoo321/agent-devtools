name: Publish packages

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/**"
      - ".changeset/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "./packages/**" build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with remote
        run: |
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"

      - name: Publish Beta (develop branch)
        if: github.ref == 'refs/heads/develop'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          # Real prerelease versions (X.Y.Z-beta.N) via changesets pre mode, not
          # the ephemeral 0.0.0-beta-<timestamp> that `--snapshot` produced (no
          # `snapshot` block in config means the snapshot base is 0.0.0). Pre mode
          # carries its state in .changeset/pre.json, which is committed on
          # develop. A stable release deletes pre.json on main and the back-merge
          # removes it from develop too, so it is normally absent right after a
          # release — re-enter whenever it is missing (the mode!=pre arm is a
          # defensive catch for a stray mode=exit file).
          if [ ! -f .changeset/pre.json ] || [ "$(node -p "require('./.changeset/pre.json').mode")" != "pre" ]; then
            pnpm exec changeset pre enter beta
          fi
          # Apply pending changesets onto the committed beta version. In pre mode
          # the .md files persist (pre.json tracks which are applied), so this is
          # idempotent when nothing new landed. Commit the bump back to develop
          # ONLY when the tree actually changed — the committed beta.N is what the
          # next run increments from, and republishing the same beta.N would have
          # npm reject the duplicate. The [skip ci] keeps this commit from
          # re-triggering the workflow (see the job-level guard).
          pnpm exec changeset version
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: version agent-devtools beta prerelease [skip ci]"
          fi
          # changeset publish creates an annotated git tag per published package
          # (pkg@X.Y.Z-beta.N — annotated so --follow-tags carries it) and points
          # the npm beta dist-tag at it. Push the version commit and those tags
          # together, matching the stable release step. An idempotent run
          # publishes nothing, so there is nothing new to tag or push.
          pnpm exec changeset publish --tag beta
          git push --follow-tags origin "${GITHUB_REF_NAME}"

      - name: Publish Release (main branch)
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          if [ -n "$(ls .changeset/*.md 2>/dev/null | grep -v README.md || true)" ]; then
            # Leave changesets pre mode (carried in from develop) so the stable
            # release aggregates to a clean X.Y.Z rather than another beta.N.
            # changeset version computes the bump from pre.json initialVersions +
            # the accumulated changesets, so the intermediate beta.N in
            # package.json is overwritten with the final stable version. The .md
            # files persist through pre mode and are consumed (deleted) here — the
            # guard above stays valid precisely because they survive until now.
            if [ -f .changeset/pre.json ]; then
              pnpm exec changeset pre exit
            fi
            pnpm exec changeset version
            git add -A
            git commit -m "chore: release agent-devtools packages [skip ci]"
            git push origin "${GITHUB_REF_NAME}"
          fi
          pnpm exec changeset publish
          git push --follow-tags origin "${GITHUB_REF_NAME}"
