name: Publish packages

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/core/**"
      - "packages/harness-core/**"
      - "packages/react/**"
      - "packages/vite/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  detect:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      packages: ${{ steps.changes.outputs.changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed packages
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            core: 'packages/core/**'
            harness-core: 'packages/harness-core/**'
            react: 'packages/react/**'
            vite: 'packages/vite/**'

  publish:
    needs: detect
    if: ${{ needs.detect.outputs.packages != '[]' && needs.detect.outputs.packages != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.detect.outputs.packages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with remote
        run: |
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"

      - name: Publish Beta (develop branch)
        if: github.ref == 'refs/heads/develop'
        env:
          NPM_DIST_TAG: beta
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: packages/${{ matrix.package }}
        run: pnpm exec release-it --preRelease=beta --ci

      - name: Publish Release (main branch)
        if: github.ref == 'refs/heads/main'
        env:
          NPM_DIST_TAG: latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: packages/${{ matrix.package }}
        run: pnpm exec release-it --ci
